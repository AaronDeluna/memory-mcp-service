name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.img.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: |
          name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${name}:master" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted, linux, x64, docker, prod]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: read
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare environment
        env:
          APP_IMAGE: ${{ needs.build.outputs.image }}
          APP_PORT: ${{ secrets.APP_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JAVA_OPTS: ${{ secrets.JAVA_OPTS }}
        run: |
          : "${POSTGRES_DB:?POSTGRES_DB secret is required}"
          : "${POSTGRES_USER:?POSTGRES_USER secret is required}"
          : "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD secret is required}"

          ENV_FILE="${RUNNER_TEMP}/my-app.env"
          {
            printf 'APP_IMAGE=%s\n' "${APP_IMAGE}"
            printf 'APP_PORT=%s\n' "${APP_PORT:-8080}"
            printf 'POSTGRES_DB=%s\n' "${POSTGRES_DB}"
            printf 'POSTGRES_USER=%s\n' "${POSTGRES_USER}"
            printf 'POSTGRES_PASSWORD=%s\n' "${POSTGRES_PASSWORD}"
            printf 'JAVA_OPTS=%s\n' "${JAVA_OPTS:--Xms256m -Xmx768m}"
          } > "${ENV_FILE}"
          chmod 600 "${ENV_FILE}"
          echo "ENV_FILE=${ENV_FILE}" >> "$GITHUB_ENV"
          echo "COMPOSE_PROJECT_NAME=memory-mcp-service" >> "$GITHUB_ENV"

      - name: Deploy
        run: |
          docker compose --env-file "${ENV_FILE}" -f docker-compose.yml pull
          docker compose --env-file "${ENV_FILE}" -f docker-compose.yml up -d --remove-orphans
          docker compose --env-file "${ENV_FILE}" -f docker-compose.yml ps

      - name: Verify Docker access
        run: |
          docker version
          docker compose version
