services:

  postgres:
    image: postgres:16
    container_name: memory-mcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-habr}
      POSTGRES_USER: ${POSTGRES_USER:-habr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habr}
    ports:
      - "5432:5432"
    volumes:
      # IMPORTANT: named volume — data persists across container restarts/recreates
      # Wiping data requires explicit `docker compose down -v`.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-habr} -d ${POSTGRES_DB:-habr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${APP_IMAGE:-ghcr.io/OWNER/memory-mcp:latest}
    container_name: memory-mcp-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-habr}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-habr}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-habr}
      JAVA_OPTS: "-Xms256m -Xmx768m"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
    # default driver = local. Survives reboot, `docker compose down`, `restart`.
    # Removed only by `docker compose down -v` or `docker volume rm`.
