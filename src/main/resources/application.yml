server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/habr}
    username: ${SPRING_DATASOURCE_USERNAME:habr}
    password: ${SPRING_DATASOURCE_PASSWORD:habr}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration